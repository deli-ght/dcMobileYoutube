<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Roboto&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://kit.fontawesome.com/6ed70bc647.js" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="main.js" defer></script>
    <title>Youtube Mobile</title>
</head>
<body>
    <!-- Header -->
    <header>
        <div class="logo">
            <i class="fab fa-youtube"></i>
            <span class="title">Youtube</span>
        </div>
        <div class="icons">
            <i class="fas fa-search"></i>
            <i class="fas fa-ellipsis-v"></i>
        </div>
    </header>

    <!-- Video Player -->
    <section class="player">
        <div class="video">
            <iframe src="https://www.youtube.com/embed/67stn7Pu7s4" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
        </div><!-- using video tag w/ control or auto -->
    </section>

    <!-- Video Info -->
    <div class="infoAndUpnext">
        <section class="info">
            <div class="metadata">
                <ul class="hashtags">
                    <li>#DreamCoding</li>
                    <li>#DreamCoders</li>
                    <li>#Ellie</li>
                </ul>
                <div class="titleAndButton">
                    <span class="title clamp">네이버 인턴 제발 뽑아주세요 열심히 일할게요. 진짜 하루 종일 회사에서 살아도 좋습니다 흑흑 저같은 인재를 안뽑으시면 누굴 뽑냐는 말입니다 네이버에 뼈를 묻겠습니다 농담아니고 진심이에요</span>
                    <button class="moreBtn">
                        <i class="fas fa-caret-down"></i>
                    </button>
                </div>

                <span class="views"> 1M views 1month ago</span>
            </div>
            <!-- action buttons -->
            <ul class="actions">
                <li><button>
                    <i class="fas fa-thumbs-up active"></i>
                    <span>415</span>
                </button></li>
                <li><button>
                    <i class="fas fa-thumbs-down"></i>
                    <span>0</span>
                </button></li>
                <li><button>
                    <i class="fas fa-share"></i>
                    <span>SHARE</span>
                </button></li>
                <li><button>
                    <i class="fas fa-plus"></i>
                    <span>SAVE</span>
                </button></li>
                <li><button>
                    <i class="fas fa-ellipsis-h"></i>
                </button></li>
            </ul>
            <!-- channel description -->
            <div class="channel">
                <div class="metadata">
                    <img src="avatar.jpg" alt="">
                <div class="info">
                    <span class="name">DuckforD</span>
                    <span class="subscribers">1M subcribers</span>
                </div>
                </div>
                <button class="subscribe">
                    subscribe
                </button>
            </div>   
        </section>
        <section class="UpNext">
            <span class="title">Up Next</span>
            <ul>
                <li class="item">
                    <div class="img"><img src="thumb1.jpg" alt=""></div>
                    <div class="info">
                        <span class="title">오리오리</span>
                        <span class="name">오리</span>
                        <span class="views">2M views</span>
                    </div>
                    <button class="moreBtn">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </li>
                <li class="item">
                    <div class="img"><img src="thumb2.png" alt=""></div>
                    <div class="info">
                        <span class="title">오리daily</span>
                        <span class="name">오리</span>
                        <span class="views">2M views</span>
                    </div>
                    <button class="moreBtn">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </li>
                <li class="item">
                    <div class="img"><img src="thumb3.png" alt=""></div>                <div class="info">
                        <span class="title">오리daily</span>
                        <span class="name">오리</span>
                        <span class="views">2M views</span>
                    </div>
                    <button class="moreBtn">
                        <i class="fas fa-ellipsis-v"></i>
                    </button>
                </li>
            </ul>
        </section>
    </div>
    

</body>
</html>
